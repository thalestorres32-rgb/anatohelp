<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnatoHelp</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="tela-inicial">
        <h1 class="logo">AnatoHelp</h1>
        <p class="subtitulo">
            Aplicativo de apoio ao estudo de anatomia
        </p>

        <div class="card">
            <p class="texto-justificado">
                Este aplicativo está sendo desenvolvido como parte do projeto de monitoria do conteúdo de anatomia da disciplina de Morfologia II do curso de Medicina da Universidade Federal Fluminense.
            </p>

            <p>
                <b>Aluno:</b> Thales Torres Leal
            </p>

            <p>
                <b>Professores/Orientadores:</b>
            </p>

            <button class="botao-principal" onclick="comecar()">
                Entrar no aplicativo
            </button>

            <br><br>

            <button id="installBtn" class="botao-principal" style="display:none; background-color: #28a745;">
                Instalar AnatoHelp no Celular
            </button>
        </div>
    </div>

    <script>
        // Função para navegar para o menu
        function comecar() {
            window.location.href = "menu.html";
        }

        // 1. Registro do Service Worker (Essencial para PWA)
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js")
                    .then(reg => console.log("Service Worker ativo!"))
                    .catch(err => console.log("Erro no SW:", err));
            });
        }

        // 2. Lógica para capturar o evento de instalação
        let deferredPrompt;
        const installBtn = document.getElementById("installBtn");

        window.addEventListener("beforeinstallprompt", (e) => {
            // Impede o Chrome de mostrar o prompt automático muito cedo
            e.preventDefault();
            // Guarda o evento para ser disparado quando o usuário clicar no seu botão
            deferredPrompt = e;
            // Mostra o seu botão de instalação personalizado
            installBtn.style.display = "inline-block";
        });

        // 3. Ação ao clicar no botão de instalar
        installBtn.addEventListener("click", async () => {
            if (!deferredPrompt) return;

            // Mostra o prompt de instalação do sistema (Android/iOS/Chrome)
            deferredPrompt.prompt();

            // Verifica se o usuário aceitou ou recusou
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Usuário respondeu à instalação: ${outcome}`);

            // Limpa o prompt para que não possa ser usado novamente
            deferredPrompt = null;
            // Esconde o botão após a escolha
            installBtn.style.display = "none";
        });

        // 4. Esconder o botão se o app já estiver instalado
        window.addEventListener('appinstalled', () => {
            console.log('AnatoHelp instalado com sucesso!');
            installBtn.style.display = "none";
        });
    </script>

</body>
</html>
